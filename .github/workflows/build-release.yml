name: Build and release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub Release
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      ARTIFACTS: ${{ github.workspace }}\artifacts\release
      INNO_DIR: ${{ github.workspace }}\.build\InnoSetup
      INNO_URL: https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe
      INNO_SHA256: 9c73c3bae7ed48d44112a0f48e66742c00090bdb5bef71d9d3c056c66e97b732

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Detect signing configuration
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          $enabled = ![string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)
          "SIGNING_ENABLED=$($enabled.ToString().ToLowerInvariant())" >> $env:GITHUB_ENV

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = Get-Content version.json -Raw | ConvertFrom-Json
          "product=$($version.productVersion)" >> $env:GITHUB_OUTPUT
          "build=$($version.buildNumber)" >> $env:GITHUB_OUTPUT
          $expectedTag = "v$($version.productVersion)"
          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag must be $expectedTag"
          }

      - name: Verify version and documentation consistency
        shell: pwsh
        run: .\scripts\Test-VersionConsistency.ps1

      - name: Prepare pinned build dependencies
        shell: pwsh
        run: .\scripts\Prepare-BuildResources.ps1

      - name: Verify SDK-style migration build
        shell: pwsh
        run: dotnet build .\MineHarbor.csproj --configuration Release -p:TreatWarningsAsErrors=true

      - name: Build Portable EXE
        shell: pwsh
        run: .\build.ps1 -OutputDirectory $env:ARTIFACTS -SkipDependencyDownload

      - name: Run tests
        shell: pwsh
        run: .\test.ps1 -LauncherPath (Join-Path $env:ARTIFACTS 'MineHarbor.exe')

      - name: Verify built version metadata
        shell: pwsh
        run: .\scripts\Test-VersionConsistency.ps1 -LauncherPath (Join-Path $env:ARTIFACTS 'MineHarbor.exe')

      - name: Optionally sign Portable EXE
        if: ${{ env.SIGNING_ENABLED == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Where-Object FullName -Match '\\x64\\' | Select-Object -First 1 -ExpandProperty FullName
          if ([string]::IsNullOrWhiteSpace($signtool)) { throw 'SignTool was not found.' }
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD (Join-Path $env:ARTIFACTS 'MineHarbor.exe')
          if ($LASTEXITCODE -ne 0) { throw 'Portable signing failed.' }

      - name: Install pinned Inno Setup
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP 'innosetup-6.7.3.exe'
          Invoke-WebRequest $env:INNO_URL -OutFile $installer
          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash
          if (!$hash.Equals($env:INNO_SHA256, [StringComparison]::OrdinalIgnoreCase)) { throw 'Inno Setup hash verification failed.' }
          if ((Get-AuthenticodeSignature $installer).Status -ne 'Valid') { throw 'Inno Setup signature verification failed.' }
          $process = Start-Process $installer -Wait -PassThru -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-',("/DIR=`"$env:INNO_DIR`"")
          if ($process.ExitCode -ne 0) { throw "Inno Setup install failed: $($process.ExitCode)" }

      - name: Package signed Portable and build installer
        shell: pwsh
        run: .\build.ps1 -OutputDirectory $env:ARTIFACTS -SkipCompile -BuildInstaller -InnoCompiler (Join-Path $env:INNO_DIR 'ISCC.exe')

      - name: Optionally sign installer
        if: ${{ env.SIGNING_ENABLED == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          if (!(Test-Path $pfx)) { [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)) }
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Where-Object FullName -Match '\\x64\\' | Select-Object -First 1 -ExpandProperty FullName
          if ([string]::IsNullOrWhiteSpace($signtool)) { throw 'SignTool was not found.' }
          $setup = Join-Path $env:ARTIFACTS 'MineHarbor-Setup-v${{ steps.version.outputs.product }}.exe'
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD $setup
          if ($LASTEXITCODE -ne 0) { throw 'Installer signing failed.' }

      - name: Remove temporary signing certificate
        if: ${{ always() && env.SIGNING_ENABLED == 'true' }}
        shell: pwsh
        run: Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP 'codesign.pfx') -Force -ErrorAction SilentlyContinue

      - name: Generate hashes and update metadata
        id: release
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { 'v${{ steps.version.outputs.product }}' }
          .\scripts\New-ReleaseArtifacts.ps1 -ArtifactsDirectory $env:ARTIFACTS -ReleaseTag $tag

      - name: Verify release artifacts
        shell: pwsh
        run: .\scripts\Test-ReleaseArtifacts.ps1 -ArtifactsDirectory $env:ARTIFACTS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mineharbor-v${{ steps.version.outputs.product }}
          if-no-files-found: error
          path: |
            ${{ env.ARTIFACTS }}\MineHarbor.exe
            ${{ env.ARTIFACTS }}\Minecraft-Server-Launcher.exe
            ${{ env.ARTIFACTS }}\MineHarbor-Portable-v${{ steps.version.outputs.product }}.zip
            ${{ env.ARTIFACTS }}\MineHarbor-Setup-v${{ steps.version.outputs.product }}.exe
            ${{ env.ARTIFACTS }}\MineHarbor-Command-Bridge-Paper-v${{ steps.version.outputs.product }}.jar
            ${{ env.ARTIFACTS }}\SHA256SUMS.txt
            ${{ env.ARTIFACTS }}\update.json

      - name: Publish GitHub Release
        if: ${{ github.ref_type == 'tag' || inputs.publish_release == true }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { 'v${{ steps.version.outputs.product }}' }
          $title = 'MineHarbor — Minecraft Server Launcher v${{ steps.version.outputs.product }} (build ${{ steps.version.outputs.build }})'
          $notes = Join-Path $env:ARTIFACTS 'release-notes.md'
          $assets = @(
            (Join-Path $env:ARTIFACTS 'MineHarbor.exe')
            (Join-Path $env:ARTIFACTS 'Minecraft-Server-Launcher.exe')
            (Join-Path $env:ARTIFACTS 'MineHarbor-Portable-v${{ steps.version.outputs.product }}.zip')
            (Join-Path $env:ARTIFACTS 'MineHarbor-Setup-v${{ steps.version.outputs.product }}.exe')
            (Join-Path $env:ARTIFACTS 'MineHarbor-Command-Bridge-Paper-v${{ steps.version.outputs.product }}.jar')
            (Join-Path $env:ARTIFACTS 'SHA256SUMS.txt')
            (Join-Path $env:ARTIFACTS 'update.json')
          )
          $existingTags = gh release list --limit 100 --json tagName | ConvertFrom-Json
          $releaseExists = @($existingTags | Where-Object { $_.tagName -eq $tag }).Count -gt 0
          if ($releaseExists) {
            gh release edit $tag --title $title --notes-file $notes --latest
            gh release upload $tag $assets --clobber
          }
          else {
            gh release create $tag $assets --title $title --notes-file $notes --latest
          }

      - name: Verify published assets through the previous launcher
        if: ${{ github.ref_type == 'tag' || inputs.publish_release == true }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $currentVersion = [Version]'${{ steps.version.outputs.product }}'
          $currentTag = "v$currentVersion"
          $verificationRoot = Join-Path $env:RUNNER_TEMP 'mineharbor-public-release-verification'
          $publishedDirectory = Join-Path $verificationRoot 'published'
          $previousDirectory = Join-Path $verificationRoot 'previous'
          $updatedDirectory = Join-Path $verificationRoot 'updated'
          New-Item -ItemType Directory -Path $publishedDirectory,$previousDirectory,$updatedDirectory -Force | Out-Null
          gh release download $currentTag --dir $publishedDirectory
          .\scripts\Test-ReleaseArtifacts.ps1 -ArtifactsDirectory $publishedDirectory -PublishedAssets

          $previous = gh release list --limit 100 --json tagName,isDraft,isPrerelease | ConvertFrom-Json | Where-Object {
            !$_.isDraft -and !$_.isPrerelease -and $_.tagName -match '^v\d+\.\d+\.\d+$' -and [Version]$_.tagName.Substring(1) -lt $currentVersion
          } | Sort-Object { [Version]$_.tagName.Substring(1) } -Descending | Select-Object -First 1
          if (!$previous) { throw 'A previous stable release is required for the public automatic-update verification.' }
          gh release download $previous.tagName --pattern MineHarbor.exe --dir $previousDirectory
          $updatedLauncher = Join-Path $updatedDirectory 'MineHarbor.exe'
          .\scripts\Test-PublicAutoUpdate.ps1 -SourceLauncherPath (Join-Path $previousDirectory 'MineHarbor.exe') -UpdateMetadataPath (Join-Path $publishedDirectory 'update.json') -DestinationPath $updatedLauncher
          .\test.ps1 -LauncherPath $updatedLauncher
